[workspace]
resolver = "2"

[workspace.package]
version = "0.0.1"
edition = "2021"
repository = "https://github.com/hopmesh/hop"

[workspace.dependencies]
hop-core = "0.0.1"
hop-endpoint-core = "0.0.1"
hop-store-sqlite = { version = "0.0.1", default-features = false }
hop-store-firestore = "0.0.1"
serde = { version = "1", features = ["derive"] }
postcard = { version = "1", features = ["use-std"] }
blake3 = "1"
sha2 = "0.11"
